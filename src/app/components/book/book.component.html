<section>
    <button class="favorite-btn" (click)="changeFavorite()">
        <span>{{book.favorite ? '\u2764' : '\u2661'}}</span>
    </button>
    <div class="image">
        <img [src]="book.image" [alt]="book.title">
    </div>
    <div class="info-book">
        <h2 class="h2-text">{{book.title}}</h2>
        <h3 class="h3-text">{{book.author}}</h3>
    </div>
</section>
